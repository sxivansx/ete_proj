# Single nginx block that:
#   - serves the React SPA under /
#   - falls back to /index.html so the client router owns all routes
#   - proxies /api/* to the FastAPI container on the internal docker network

server {
    listen 80;
    server_name _;

    # Reasonable upload cap — our xlsx templates are < 1 MB but faculty may
    # paste in larger sheets.
    client_max_body_size 20m;

    # Static SPA.
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text and JS assets so load times stay snappy.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long cache for hashed Vite assets — they're content-addressed.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Client-routed paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API passthrough. ``api`` is the docker-compose service name.
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Uploads + attainment calc can take a few seconds on large sheets.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
